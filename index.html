<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>The Escapist | 2026 雙城紀行</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        /* Warm Sand Background */
        body { background-color: #f9f8f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        .chart-container {
            position: relative; width: 100%; max-width: 320px; margin-left: auto; margin-right: auto;
            height: 250px; max-height: 250px;
        }
        
        /* Active State for Tropical Theme */
        .nav-btn.active {
            background-color: #f1ede6; 
            border-left: 4px solid #134e4a; 
            color: #134e4a;
        }
        
        .scroll-area::-webkit-scrollbar { width: 5px; }
        .scroll-area::-webkit-scrollbar-track { background: transparent; }
        .scroll-area::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Mobile Menu Transitions */
        #sidebar { transition: transform 0.3s ease-in-out; }
        .menu-open { transform: translateX(0) !important; }
    </style>
</head>
<body class="text-slate-800 antialiased h-[100dvh] w-full flex flex-col overflow-hidden bg-[#f9f8f6]">

    <header class="bg-teal-900 text-stone-50 py-4 px-4 md:px-6 shadow-md flex-shrink-0 z-40 relative flex items-center justify-between">
        <div class="flex items-center">
            <button id="menu-toggle" class="md:hidden text-2xl mr-4 focus:outline-none hover:text-orange-300 transition-colors">
                ☰
            </button>
            <div>
                <h1 class="text-xl md:text-3xl font-bold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-orange-100 to-stone-300" style="font-family: Georgia, serif;">
                    The Escapist <span class="text-sm md:text-lg font-normal tracking-normal text-stone-300 md:ml-2 block md:inline">| 2026 雙城紀行</span>
                </h1>
                <p class="text-[10px] md:text-xs text-teal-200 mt-1 uppercase tracking-widest">Shih-Yu & Shang-Yi • Lipe x Kuala Lumpur</p>
            </div>
        </div>
        <div class="text-right hidden md:block">
            <span class="bg-orange-500 text-white text-xs px-3 py-1.5 rounded-sm uppercase tracking-widest font-semibold shadow-sm">⭐ Michelin Scheduled</span>
        </div>
    </header>

    <main class="flex-grow flex relative w-full h-full overflow-hidden bg-[#f9f8f6]">
        
        <div id="mobile-overlay" class="absolute inset-0 bg-teal-900/40 z-20 hidden md:hidden backdrop-blur-sm transition-opacity"></div>

        <section id="sidebar" class="absolute md:relative inset-y-0 left-0 z-30 w-72 md:w-80 bg-white border-r border-stone-200 flex flex-col h-full shadow-2xl md:shadow-none transform -translate-x-full md:translate-x-0">
            <div class="p-4 bg-stone-50 border-b border-stone-200 flex justify-between items-center flex-shrink-0">
                <h2 class="text-sm font-bold text-teal-800 uppercase tracking-widest">Itinerary & Tools</h2>
                <button id="menu-close" class="md:hidden text-2xl text-slate-500 focus:outline-none">×</button>
            </div>
            
            <div class="overflow-y-auto scroll-area flex-grow flex flex-col pb-6 md:pb-0">
                <button id="tab-overview" class="nav-btn w-full text-left px-5 py-4 hover:bg-stone-200 focus:outline-none flex items-center justify-between border-b border-stone-200 bg-stone-50/50">
                    <div>
                        <span class="text-xs font-bold text-blue-600 uppercase tracking-wider">Overview</span>
                        <div class="font-semibold text-slate-800 mt-1">🗺️ 旅程總覽</div>
                    </div>
                    <div class="text-xl opacity-80">📖</div>
                </button>

                <div id="day-list" class="flex-grow"></div>

                <div class="border-t border-stone-200 bg-stone-50 mt-auto flex-shrink-0">
                    <button id="tab-finance" class="nav-btn w-full text-left px-5 py-4 hover:bg-stone-200 focus:outline-none flex items-center justify-between">
                        <div>
                            <span class="text-xs font-bold text-emerald-600 uppercase tracking-wider">Tracker & Budget</span>
                            <div class="font-semibold text-slate-700 mt-1">💳 記帳與財務指南</div>
                        </div>
                        <div class="text-2xl opacity-80">💰</div>
                    </button>
                </div>
            </div>
        </section>

        <section class="flex-1 bg-[#f9f8f6] flex flex-col h-full overflow-y-auto scroll-area p-4 md:p-8 lg:px-12 relative" id="dynamic-content">
            </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // 1. Firebase Cloud Setup (Real-time Sync)
        // ==========================================
        let app, auth, db, appId;
        try {
            const configStr = typeof __firebase_config !== 'undefined' ? __firebase_config : '{}';
            const firebaseConfig = JSON.parse(configStr);
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            appId = typeof __app_id !== 'undefined' ? __app_id : 'escapist-2026-app';
        } catch (e) {
            console.warn("Local mode or Firebase not injected.");
        }

        window.currentUser = null;
        window.expenses = [];

        const initAuth = async () => {
            if (!auth) return;
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) {
                console.error("Auth init error:", e);
            }
        };

        if (auth) initAuth();

        if (auth) {
            onAuthStateChanged(auth, (user) => {
                window.currentUser = user;
                if (user) setupRealtimeListeners();
            });
        }

        let unsubExpenses = null;

        function setupRealtimeListeners() {
            if (unsubExpenses) unsubExpenses();

            // Sync Expenses
            const expensesRef = collection(db, 'artifacts', appId, 'public', 'data', 'shared_expenses');
            unsubExpenses = onSnapshot(expensesRef, (snapshot) => {
                window.expenses = [];
                snapshot.forEach(d => window.expenses.push({ id: d.id, ...d.data() }));
                window.expenses.sort((a, b) => b.timestamp - a.timestamp); // Newest first
                if (document.getElementById('expense-list')) {
                    window.updateTrackerUI();
                }
            }, (error) => console.error("Expenses listen error", error));
        }

        // --- Cloud Storage Functions (Attached to Window for UI) ---
        window.submitExpense = async function(e) {
            e.preventDefault();
            if (!window.currentUser) { alert("尚未連線到雲端伺服器，請稍後再試。"); return; }
            
            const amount = parseFloat(document.getElementById('exp-amount').value);
            if (!amount || amount <= 0) return;
            
            const btn = e.submitter;
            const originalText = btn.innerText;
            btn.innerText = "連線中...";
            btn.disabled = true;

            const newExp = {
                amount: amount,
                currency: document.getElementById('exp-currency').value,
                note: document.getElementById('exp-note').value,
                timestamp: Date.now()
            };

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'shared_expenses'), newExp);
                document.getElementById('exp-amount').value = '';
                document.getElementById('exp-note').value = '';
            } catch(err) {
                console.error(err);
                alert("儲存失敗，請檢查網路");
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        };

        window.deleteExpense = async function(id) {
            if (!window.currentUser) return;
            if(confirm('確定要刪除這筆紀錄嗎？(雙方手機都會同步刪除喔)')) {
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'shared_expenses', id));
                } catch(e) { console.error("Delete failed", e); }
            }
        };

        // ==========================================
        // 2. UI & Itinerary Data
        // ==========================================
        
        // --- Mobile Menu Logic ---
        const sidebar = document.getElementById('sidebar');
        const mobileOverlay = document.getElementById('mobile-overlay');
        const menuToggleBtn = document.getElementById('menu-toggle');
        const menuCloseBtn = document.getElementById('menu-close');

        function openMenu() {
            sidebar.classList.add('menu-open');
            mobileOverlay.classList.remove('hidden');
        }

        function closeMenu() {
            sidebar.classList.remove('menu-open');
            mobileOverlay.classList.add('hidden');
        }

        menuToggleBtn.addEventListener('click', openMenu);
        menuCloseBtn.addEventListener('click', closeMenu);
        mobileOverlay.addEventListener('click', closeMenu);
        
        // --- Tab Click Helper ---
        window.handleTabClick = function() {
            if (window.innerWidth < 768) closeMenu();
        };

        // --- Badge & Map Helpers ---
        const badgeTransit = `<span class="bg-indigo-100 text-indigo-700 px-1.5 py-0.5 rounded border border-indigo-200 text-[10px] uppercase font-bold tracking-wider ml-2 shadow-sm whitespace-nowrap align-middle inline-flex items-center"><span class="mr-1 text-[12px]">🚆</span>大眾運輸</span>`;
        const badgeGrab = `<span class="bg-green-100 text-green-800 px-1.5 py-0.5 rounded border border-green-300 text-[10px] uppercase font-bold tracking-wider ml-2 shadow-sm whitespace-nowrap align-middle inline-flex items-center"><span class="mr-1 text-[12px]">🚕</span>Grab</span>`;
        const badgeFlight = `<span class="bg-sky-100 text-sky-700 px-1.5 py-0.5 rounded border border-sky-200 text-[10px] uppercase font-bold tracking-wider ml-2 shadow-sm whitespace-nowrap align-middle inline-flex items-center"><span class="mr-1 text-[12px]">✈️</span>航空飛行</span>`;
        const badgeFerry = `<span class="bg-teal-100 text-teal-700 px-1.5 py-0.5 rounded border border-teal-200 text-[10px] uppercase font-bold tracking-wider ml-2 shadow-sm whitespace-nowrap align-middle inline-flex items-center"><span class="mr-1 text-[12px]">🚢</span>跨國船班</span>`;
        
        const gmap = (query) => `<a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query)}" target="_blank" title="開啟地圖" class="text-[12px] whitespace-nowrap ml-1.5 inline-flex items-center bg-white px-1.5 py-0.5 rounded shadow-sm border border-stone-200 opacity-70 hover:opacity-100 transition-opacity">📍</a>`;

        // 麗貝島美食與酒吧口袋名單
        const lipeFoodList = `
            <div class="mt-8 bg-white p-5 md:p-6 rounded-2xl border border-stone-200 shadow-sm">
                <div class="flex justify-between items-center mb-4 border-b border-stone-100 pb-3">
                    <h4 class="font-bold text-teal-900 flex items-center text-lg"><span class="mr-2">🍽️</span>麗貝島 隨興口袋名單</h4>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-6 text-sm text-slate-700">
                    <div>
                        <div class="font-bold text-slate-800 mb-2 px-2 border-l-4 border-orange-500 bg-orange-50/50 py-1">🦀 豪邁海鮮</div>

                            <li>• <b>Nee Papaya BBQ</b> (挑大頭蝦/檸檬魚) ${gmap('Nee Papaya Koh Lipe')}</li>
                            <li>• <b>King Crab Seafood</b> (步行街新鮮現撈) ${gmap('King Crab Seafood Koh Lipe')}</li>
                            <li>• <b>Papaya Mom</b> (青木瓜沙拉/烤雞) ${gmap('Papaya Mom Koh Lipe')}</li>
                        </ul>
                    </div>
                    
                    <div>
                        <div class="font-bold text-slate-800 mb-2 px-2 border-l-4 border-teal-500 bg-teal-50/50 py-1">🍹 微醺與火舞酒吧</div>
                        <ul class="space-y-2 pl-2 mt-2">
                            <li>• <b>Zodiac Seesun Resort</b> (必看！最棒沙灘火舞) ${gmap('Zodiac Seesun Resort Koh Lipe')}</li>
                            <li>• <b>Happy Vibe Bar</b> (日落沙灘懶骨頭) ${gmap('Happy Vibe Bar Koh Lipe')}</li>
                            <li>• <b>Sea La Vie Bar</b> (超 Chill 海景小酒吧) ${gmap('Sea La Vie Bar Koh Lipe')}</li>
                        </ul>
                    </div>

                    <div class="col-span-full">
                        <div class="font-bold text-slate-800 mb-2 px-2 border-l-4 border-rose-400 bg-rose-50/50 py-1">🍢 街頭小吃與異國料理</div>
                        <ul class="space-y-2 pl-2 grid grid-cols-1 md:grid-cols-2 gap-2 mt-2">
                            <li>• <b>La Luna</b> (島上第一名薄皮披薩) ${gmap('La Luna Koh Lipe')}</li>
                            <li>• <b>Madame Yoohoo</b> (香蕉巧克力煎餅) ${gmap('Madame Yoohoo Koh Lipe')}</li>
                            <li>• <b>Elephant Coffee House</b> (美式漢堡/早午餐) ${gmap('Elephant Coffee House Koh Lipe')}</li>
                            <li>• <b>義式冰淇淋 Gelato</b> (步行街上尋寶，消暑必吃！)</li>
                        </ul>
                    </div>
                </div>
            </div>
        `;

        const itineraryData = [
            {
                day: "Day 1 (台灣 ➔ 蘭卡威)", date: "3/21 (六)", title: "啟程與開齋節夜市", icon: "✈️",
                details: `
                    <ul class="space-y-5 text-sm px-1">
                        <li class="flex items-start">
                            <div class="pt-0.5 leading-relaxed"><b>04:30</b> 專車到府接送，舒舒服服前往機場。 ${badgeGrab}</div>
                        </li>
                        <li class="flex items-start">
                            <div class="pt-0.5 leading-relaxed"><b>08:30</b> 搭乘華航 CI 721 從台北 (TPE) 出發。 ${badgeFlight}</div>
                        </li>
                        <li class="flex items-start">
                            <div class="pt-0.5 leading-relaxed"><b>13:25</b> 抵達吉隆坡 KLIA T1 ${gmap("Kuala Lumpur International Airport Terminal 1")}。</div>
                        </li>
                        <li class="flex items-start">
                            <div class="pt-0.5 leading-relaxed"><b>14:40 (機場吃逛)</b> 入境後直奔 Level 5 出境大廳吃 <b>「華陽冰室」</b> 的酥皮蛋塔。吃飽可在機場逛逛免稅店，或買杯大馬人氣的 <b>Bask Bear Coffee (黑糖熊咖啡)</b> 🌴。</div>
                        </li>
                        <li class="flex items-start">
                            <div class="pt-0.5 leading-relaxed"><b>18:55</b> 轉機飛往蘭卡威 (MH 1450)，20:00 抵達 (LGK)，國內線免過海關直接領行李。 ${badgeFlight}</div>
                        </li>
                        <li class="flex items-start">
                            <div class="pt-0.5 leading-relaxed"><b>20:30 (機場交通)</b> 搭乘 Grab 直接前往飯店 (車程約 25 分鐘)。 ${badgeGrab}</div>
                        </li>
                        <li class="flex items-start">
                            <div class="pt-0.5 leading-relaxed"><b>21:00</b> 入住 <b>Bayview Hotel Langkawi</b> ${gmap("Bayview Hotel Langkawi")}。</div>
                        </li>
                        <li class="flex items-start">
                            <div class="pt-0.5 leading-relaxed"><b>21:30 (夜市尋寶)</b> 步行前往 <b>瓜鎮週六夜市</b> ${gmap("Kuah Night Market")} 感受開齋節氣氛！<br>
                                <span class="text-teal-700 font-semibold mt-2 inline-block bg-teal-50 px-2 py-1 rounded">💡 夜市必吃推薦：</span><br>
                                除了沙嗲與烤雞，一定要嚐嚐 <b>Roti Jala (網煎餅沾咖哩)</b>、<b>Murtabak (馬來厚餡餅)</b>、<b>Ayam Percik (椰汁香料烤雞)</b>，還要買袋色彩繽紛的 <b>Air Balang (桶裝特色冰飲)</b>！
                            </div>
                        </li>
                    </ul>`
            },
            {
                day: "Day 2 (蘭卡威 ➔ 麗貝島)", date: "3/22 (日)", title: "登島！泰國馬爾地夫", icon: "🏝️",
                details: `
                    <div class="bg-rose-50 text-rose-800 p-4 rounded-xl mb-6 text-sm border border-rose-200 shadow-sm flex items-start">
                        <span class="text-xl mr-2">⚠️</span>
                        <div><b>重要提醒：</b> 船班規定須提前 90 分鐘報到。請務必於 <b>07:45</b> 抵達瓜鎮碼頭 ${gmap("Kuah Jetty Langkawi")}。</div>
                    </div>
                    <ul class="space-y-5 text-sm px-1">
                        <li class="flex items-start">
                            <div class="pt-0.5 leading-relaxed"><b>07:30 (碼頭交通)</b> 退房並搭乘 Grab 前往瓜鎮碼頭 (車程不到 10 分鐘)。 ${badgeGrab}</div>
                        </li>
                        <li class="flex items-start">
                            <div class="pt-0.5 leading-relaxed"><b>09:15 (馬來時間)</b> 搭乘快艇前往泰國麗貝島。 ${badgeFerry}</div>
                        </li>
                        <li class="flex items-start">
                            <div class="pt-0.5 leading-relaxed"><b>09:45 (泰國時間)</b> 抵達 Pattaya Beach，沙灘辦理泰國入境 ${gmap("Pattaya Beach Koh Lipe")}。</div>
                        </li>
                        <li class="flex items-start">
                            <div class="pt-0.5 leading-relaxed"><b>11:00</b> 抵達 <b>Akira Lipe Resort</b> 寄放行李，換上泳裝準備度假！ ${gmap("Akira Lipe Resort")}</div>
                        </li>
                        <li class="flex items-start">
                            <div class="pt-0.5 leading-relaxed"><b>午後與晚餐</b> 參考下方清單隨興吃午餐、下午茶與晚餐。傍晚可以到沙灘看日落。</div>
                        </li>
                    </ul>
                    ${lipeFoodList}`
            },
            {
                day: "Day 3 (麗貝島)", date: "3/23 (一)", title: "內圈包船浮潛", icon: "🤿",
                details: `
                    <ul class="space-y-5 text-sm px-1">
                        <li class="flex items-start">
                            <div class="pt-0.5 leading-relaxed"><b>上午</b> 飯店門口直接 <b>包長尾船出海 (Inner Zone)</b>。<br>亮點：Jabang 水道 (七色軟珊瑚) ${gmap("Jabang Koh Lipe")}、Koh Hin Ngam (神秘疊石島) ${gmap("Koh Hin Ngam")}。</div>
                        </li>
                        <li class="flex items-start">
                            <div class="pt-0.5 leading-relaxed"><b>下午</b> 回 Akira 泳池邊休息，或是到步行街上買杯清爽的<b>義式冰淇淋 (Gelato)</b> 或現剖椰子解暑！</div>
                        </li>
                        <li class="flex items-start">
                            <div class="pt-0.5 leading-relaxed"><b>晚上</b> 參考下方清單，挑選今晚想翻牌的美食與火舞酒吧！</div>
                        </li>
                    </ul>
                    ${lipeFoodList}`
            },
            {
                day: "Day 4 (麗貝島)", date: "3/24 (二)", title: "島上發懶耍廢模式", icon: "🦦",
                details: `
                    <ul class="space-y-5 text-sm px-1">
                        <li class="flex items-start">
                            <div class="pt-0.5 leading-relaxed"><b>上午</b> 睡到自然醒！不設限行程，享受不被時間追趕的早晨。</div>
                        </li>
                        <li class="flex items-start">
                            <div class="pt-0.5 leading-relaxed"><b>下午</b> 可以在 Akira 池畔曬太陽看書，或是散步去 <b>拖尾沙灘 (Karma Beach)</b> 踩踩水、拍美照 ${gmap("Karma Beach Koh Lipe")}。</div>
                        </li>
                        <li class="flex items-start">
                            <div class="pt-0.5 leading-relaxed"><b>傍晚</b> 逛逛步行街，去 7-11 補給泰國限定零食 ${gmap("Walking Street Koh Lipe")}。</div>
                        </li>
                        <li class="flex items-start">
                            <div class="pt-0.5 leading-relaxed"><b>晚上</b> 繼續解鎖麗貝島的美食與派對地圖：</div>
                        </li>
                    </ul>
                    ${lipeFoodList}`
            },
            {
                day: "Day 5 (麗貝島)", date: "3/25 (三)", title: "獨木舟 & 懸崖浪漫夜", icon: "🛶",
                details: `
                    <ul class="space-y-5 text-sm px-1">
                        <li class="flex items-start">
                            <div class="pt-0.5 leading-relaxed"><b>09:30</b> (可選) 散步至 <b>Castaway Resort</b> 在木造涼亭看海吃早餐 ${gmap("Castaway Resort Koh Lipe")}。</div>
                        </li>
                        <li class="flex items-start">
                            <div class="pt-0.5 leading-relaxed"><b>11:00</b> 活動：租 <b>透明獨木舟</b> 划向無人島。</div>
                        </li>
                        <li class="flex items-start">
                            <div class="pt-0.5 leading-relaxed"><b>16:00</b> 放鬆：找間優質按摩店做 <b>Aloe Vera 蘆薈修復按摩</b>，舒緩曬後的肌膚。</div>

        // --- Finance View ---

                                <div class="text-[10px] md:text-xs text-teal-800 font-bold mb-1 uppercase tracking-wider">已花費 (MYR)</div>
                                <div class="text-lg md:text-2xl font-bold text-teal-600" id="total-myr">0</div>
                            </div>
                            <div class="bg-slate-800 p-3 md:p-4 rounded-xl text-center shadow-inner">
                                <div class="text-[10px] md:text-xs text-slate-300 font-bold mb-1 uppercase tracking-wider">刷卡/台幣 (TWD)</div>

                            </div>
                        </div>

                        <form onsubmit="submitExpense(event)" class="flex flex-col md:flex-row gap-3 mb-6 bg-stone-50 p-3 md:p-4 rounded-xl border border-stone-100">
                            <input type="number" id="exp-amount" placeholder="金額" required min="0.01" step="0.01" class="w-full md:w-1/4 p-2.5 rounded-lg border border-stone-300 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
                            <select id="exp-currency" class="w-full md:w-1/4 p-2.5 rounded-lg border border-stone-300 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 bg-white">
                                <option value="THB">泰銖 (THB)</option>
                                <option value="MYR">馬幣 (MYR)</option>
                                <option value="TWD">台幣/刷卡 (TWD)</option>
                            </select>
                            <input type="text" id="exp-note" placeholder="項目 (如: Beta KL)" required class="w-full md:flex-1 p-2.5 rounded-lg border border-stone-300 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
                            <button type="submit" class="w-full md:w-auto bg-teal-800 text-white px-6 py-2.5 rounded-lg text-sm font-bold hover:bg-teal-700 transition shadow-md">新增</button>
                        </form>

                        <div class="max-h-64 overflow-y-auto scroll-area border-t border-stone-100 pt-4">

                            </ul>
                        </div>
                    </div>

                    <div class="bg-white rounded-2xl p-5 md:p-8 border border-stone-200 shadow-sm mb-8">
                        <h2 class="text-xl font-bold text-teal-900 mb-6 border-b border-stone-100 pb-3">📊 當地總花費預估 (不含機加酒)</h2>
                        <div class="flex flex-col xl:flex-row gap-8 items-center">
                            <div class="w-full xl:w-2/5 flex flex-col items-center">
                                <div class="chart-container">
                                    <canvas id="budgetChart"></canvas>

                                <div class="text-center mt-2">
                                    <span class="text-3xl font-black text-teal-900 tracking-tight">~NT$ 50,000</span>
                                </div>
                            </div>
                            
                            <div class="w-full xl:w-3/5 space-y-4">
                                <p class="text-sm text-slate-600 mb-2 leading-relaxed">
                                    機票與住宿已付款，扣除後預估雙人<b>「當地吃喝玩樂」</b>總花費約在 <b>5 萬台幣</b> 左右：
                                </p>
                                <div class="bg-stone-50 p-4 rounded-xl border-l-4 border-blue-500">
                                    <h3 class="font-bold text-sm text-slate-800">🚢 當地大交通 (約 NT$ 5,000)</h3>
                                </div>
                                <div class="bg-stone-50 p-4 rounded-xl border-l-4 border-orange-500">
                                    <h3 class="font-bold text-sm text-slate-800">🍽️ 頂級餐飲與美食 (約 NT$ 30,000)</h3>
                                </div>
                                <div class="bg-stone-50 p-4 rounded-xl border-l-4 border-emerald-500">
                                    <h3 class="font-bold text-sm text-slate-800">💆‍♂️ 玩樂與購物備用金 (約 NT$ 15,000)</h3>
                                </div>
                            </div>
                        </div>
                    </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="bg-orange-50/50 p-5 rounded-xl border border-orange-100">
                                <h3 class="font-bold text-sm text-orange-800 flex items-center mb-2"><span class="text-xl mr-2">🇹🇭</span>泰銖 (THB)：先換 10,000</h3>
                                <p class="text-xs text-slate-600 leading-relaxed"><b>必須在台灣先換好！</b> 用於包船、門票、小費、夜市小吃。島上餐廳付現最划算。</p>

                                <p class="text-xs text-slate-600 leading-relaxed"><b>台灣換小額，大額當地刷卡或提領！</b> 先換小額應付第一天夜市。若需大筆馬幣，於吉隆坡用 PLUS 提款卡領取。</p>

                    </div>

                </div>
            `;

            // Setup Chart.js
            const ctx = document.getElementById('budgetChart').getContext('2d');
            if(window.currentChart) window.currentChart.destroy();
            window.currentChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['大交通 (船票/Grab)', '頂級餐飲與吃喝', '玩樂與購物'],
                    datasets: [{
                        data: [5000, 30000, 15000], 
                        backgroundColor: ['#3b82f6', '#f97316', '#10b981'],
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false, cutout: '75%',
                    plugins: {
                        legend: { position: 'bottom', labels: { font: { family: "'Segoe UI', sans-serif", size: 12 }, usePointStyle: true, padding: 20 } },
                        tooltip: { backgroundColor: 'rgba(15, 39, 44, 0.9)', padding: 12, cornerRadius: 8, callbacks: { label: function(c) { return ' NT$ ' + c.parsed.toLocaleString(); } } }
                    }
                }
            });

            if (window.expenses && window.expenses.length >= 0) window.updateTrackerUI();
        }

        window.updateTrackerUI = function() {
            const listContainer = document.getElementById('expense-list');
            if(!listContainer) return;

            let thb = 0, myr = 0, twd = 0;
            listContainer.innerHTML = '';
            
            if(window.expenses.length === 0) {
                listContainer.innerHTML = '<li class="text-center text-sm text-slate-400 py-6 bg-stone-50 rounded-xl border border-dashed border-stone-200">目前還沒有記帳紀錄喔！隨手記錄同步不漏財 ✨</li>';
            } else {
                window.expenses.forEach((exp) => {
                    if(exp.currency === 'THB') thb += exp.amount;
                    if(exp.currency === 'MYR') myr += exp.amount;
                    if(exp.currency === 'TWD') twd += exp.amount;

                    let currColor = exp.currency === 'THB' ? 'text-orange-600' : (exp.currency === 'MYR' ? 'text-teal-600' : 'text-slate-600');
                    
                    const li = document.createElement('li');
                    li.className = "flex justify-between items-center bg-white p-3 md:p-4 rounded-xl border border-stone-100 text-sm shadow-sm hover:shadow-md transition-shadow group";
                    li.innerHTML = `
                        <div class="flex-1 font-medium text-slate-700 pr-2 overflow-hidden text-ellipsis whitespace-nowrap">${exp.note}</div>
                        <div class="font-bold ${currColor} w-24 text-right flex-shrink-0 text-base">${exp.amount.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 2})} <span class="text-[10px] uppercase opacity-70">${exp.currency}</span></div>
                        <button onclick="deleteExpense('${exp.id}')" class="ml-4 text-slate-300 hover:text-rose-500 focus:outline-none flex-shrink-0 transition-colors" title="刪除紀錄">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                    `;
                    listContainer.appendChild(li);
                });
            }

            document.getElementById('total-thb').innerText = thb.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 2});
            document.getElementById('total-myr').innerText = myr.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 2});
            document.getElementById('total-twd').innerText = twd.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 2});
        }

        // --- Render Day View ---
        function renderDayView(index) {
            clearActiveTabs();
            const btn = document.getElementById(`btn-day-${index}`);
            if(btn) btn.classList.add('active');
            handleTabClick();
            dynamicContent.scrollTop = 0;
            
            const dayObj = itineraryData[index];
            const displayDayStr = dayObj.day.split(' (')[0]; 
            const locStr = dayObj.day.split(' (')[1] ? `(${dayObj.day.split(' (')[1]}` : '';
            const fullTitle = dayObj.title;
            
            dynamicContent.innerHTML = `
                <div class="fade-in pb-32 max-w-4xl mx-auto w-full">
                    <div class="relative w-full h-24 md:h-32 mb-8 rounded-2xl overflow-hidden shadow-sm bg-gradient-to-r from-teal-900 via-teal-800 to-[#1d3557] flex flex-col justify-center px-6 md:px-8">
                        <div class="text-teal-200/80 text-xs md:text-sm font-semibold tracking-widest uppercase mb-1">${displayDayStr} <span class="ml-2">${locStr}</span></div>
                        <h3 class="text-xl md:text-3xl font-bold text-white tracking-wide z-20" style="font-family: Georgia, serif;">${fullTitle}</h3>
                    </div>
                    
                    <div class="px-2 md:px-4 bg-white rounded-2xl p-6 shadow-sm border border-stone-100">
                        <h4 class="text-lg font-bold text-teal-900 mb-6 border-b border-stone-100 pb-3 flex items-center"><span class="mr-2">📅</span> 詳細行程</h4>
                        ${dayObj.details}
                    </div>
                </div>
            `;
        }

        // --- Setup Navigation & Init ---
        document.getElementById('tab-overview').addEventListener('click', renderOverviewView);
        document.getElementById('tab-finance').addEventListener('click', renderFinanceView);

        // Populate Day List
        itineraryData.forEach((dayObj, index) => {
            const btn = document.createElement('button');
            btn.id = `btn-day-${index}`;
            btn.className = `nav-btn day-btn w-full text-left px-5 py-4 border-b border-stone-200 hover:bg-stone-200 transition-colors focus:outline-none flex items-center justify-between group`;
            
            const displayDay = dayObj.day.split(' (')[0];
            const location = dayObj.day.split(' (')[1] ? `(${dayObj.day.split(' (')[1]}` : '';

            btn.innerHTML = `
                <div class="overflow-hidden pr-2">
                    <span class="text-[10px] font-bold text-teal-700/70 uppercase tracking-wider block mb-1">${displayDay} <span class="font-normal opacity-70">${location}</span></span>
                    <div class="flex items-center">

                    </div>
                </div>
                <div class="text-xl flex-shrink-0 opacity-70 group-hover:opacity-100 transition-opacity">${dayObj.icon}</div>
            `;
            
            btn.addEventListener('click', () => renderDayView(index));
            dayListContainer.appendChild(btn);
        });

        // Initialize App by rendering the Overview first
        renderOverviewView();

    </script>
